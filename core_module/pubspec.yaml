name: coffee_shop_core
description: "Core module for Coffee Shop project — Models, Services, Theme, Utils. Owned by Dev 1."
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.11.0"

dependencies:
  flutter:
    sdk: flutter

  # === Models & Serialization ===
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # === Firebase ===
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  # === State Management ===
  provider: ^6.1.0

  # === Navigation ===
  go_router: ^14.0.0

  # === UI ===
  cached_network_image: ^3.4.0
  image_picker: ^1.2.3
  flutter_svg: ^2.0.0

  # === Utilities ===
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.0
  lottie: ^3.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/Coffee.json
