name: app_customer
description: "Coffee Shop — Customer App (Menu, Cart, Checkout, Orders, Profile). Dev 2 & Dev 3."
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core module (Dev 1 owns — do NOT modify)
  coffee_shop_core:
    path: ../core_module

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.0

  # Firebase (initialized via core_module)
  firebase_core: ^3.0.0

  cupertino_icons: ^1.0.6

  # QR cho Pickup Pass (UC-19/UC-24) — render thuần Dart, không native code
  qr_flutter: ^4.1.0

  # Utilities & Auth dependencies
  intl: ^0.19.0
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
