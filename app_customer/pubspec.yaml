name: app_customer
description: "Coffee Shop — Customer App (Menu, Cart, Checkout, Orders, Profile). Dev 2 & Dev 3."
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core module (Dev 1 owns — do NOT modify)
  coffee_shop_core:
    path: ../core_module

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.0

  # Firebase (initialized via core_module)
  firebase_core: ^3.0.0

  cupertino_icons: ^1.0.6

  # QR cho Pickup Pass (UC-19/UC-24) — render thuần Dart, không native code
  qr_flutter: ^4.1.0

  # UC-05: bản đồ + định vị cho form địa chỉ (stack miễn phí, không cần API key)
  flutter_map: ^8.2.2      # OpenStreetMap tiles
  latlong2: ^0.9.1
  geolocator: ^14.0.2      # GPS vị trí hiện tại
  http: ^1.5.0             # Photon autocomplete + Nominatim reverse geocode

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
