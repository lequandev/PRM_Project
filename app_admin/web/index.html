<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base
    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Coffee Shop Admin Dashboard — Quản lý cửa hàng cà phê">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Coffee Shop Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Coffee Shop Admin ☕</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading splash screen */
    body {
      margin: 0;
      background-color: #1E1E2E;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    #loading {
      text-align: center;
      color: #D4A017;
    }
    #loading h2 {
      font-size: 24px;
      margin-top: 16px;
      color: white;
    }
    #loading p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(212,160,23,0.2);
      border-top-color: #D4A017;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Coffee Shop Admin</h2>
    <p>Đang khởi động...</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>
</html>
