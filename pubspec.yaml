name: badminton_management_app
description: "A Product Management and Shopping Cart App for Badminton Racquets with Full Firebase Integration."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: "3.12.0"

dependencies:
  flutter:
    sdk: flutter

  # Điều hướng màn hình tập trung
  go_router: ^14.0.0

  # Ghi nhớ trạng thái Đăng nhập / Remember Me
  shared_preferences: ^2.5.5

  # Hệ sinh thái Firebase Core & Services
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Thư viện bổ trợ chọn ảnh từ bộ nhớ máy để up lên Storage
  image_picker: ^1.0.7

  cupertino_icons: ^1.0.6
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
